name: Feature request
description: Suggest a maintainer workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: False-positive risk
      description: How could this annoy maintainers or contributors?
